<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoRide — Live Safety Tracker</title>
    
    <!-- Leaflet Maps CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00B14F;
            --surface: #FFFFFF;
            --on-surface: #1F2937;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background: #f3f4f6;
        }

        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }

        .overlay {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            padding: 16px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(0, 177, 79, 0.1);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 177, 79, 0.1);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 0 rgba(0, 177, 79, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(0, 177, 79, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 177, 79, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 177, 79, 0); }
        }

        h1 { margin: 0; font-size: 18px; color: var(--on-surface); }
        p { margin: 4px 0 0; font-size: 14px; color: #6b7280; }

        #no-ride {
            display: none;
            text-align: center;
            padding: 40px;
        }

        /* Marker Styles */
        .car-marker {
            background-color: var(--primary);
            border: 3px solid white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="overlay" id="info-card">
        <div class="status-badge">
            <div class="pulse"></div>
            LIVE TRACKING
        </div>
        <h1 id="ride-title">Ride Tracking Active</h1>
        <p id="ride-details">Waiting for location updates...</p>
    </div>

    <div id="no-ride">
        <h1>Invalid Ride Link</h1>
        <p>Please check the tracking link sent to you.</p>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Firebase JS (Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // --- CONFIGURATION ---
        const firebaseConfig = {
            databaseURL: "https://my-first-project-d0eac-default-rtdb.firebaseio.com/"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Get Ride ID from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        // Supports both 'ride' and 'ride_id' for backward compatibility, but 'ride_id' is preferred
        const rideId = urlParams.get('ride_id') || urlParams.get('ride');

        if (!rideId) {
            document.getElementById('info-card').style.display = 'none';
            document.getElementById('no-ride').style.display = 'block';
        }

        // Initialize Map
        // Parse initial lat/lng from URL if available to show pickup immediately
        const initLat = parseFloat(urlParams.get('lat')) || 31.5204;
        const initLng = parseFloat(urlParams.get('lng')) || 74.3587;

        const map = L.map('map').setView([initLat, initLng], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        if (urlParams.get('lat')) {
            L.circle([initLat, initLng], {
                color: '#00B14F',
                fillColor: '#00B14F',
                fillOpacity: 0.1,
                radius: 100
            }).addTo(map).bindPopup("Pickup Point").openPopup();
        }

        // Store markers by role
        const markers = {
            user: null,
            driver: null
        };
        const polyline = L.polyline([], {color: '#00B14F', weight: 5, opacity: 0.7}).addTo(map);

        function createIcon(role) {
            const color = role === 'driver' ? '#000' : '#00B14F';
            const iconHtml = role === 'driver' 
                ? `<div style="background:${color}; width:30px; height:30px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; color:white; font-size:16px;">🚗</div>`
                : `<div style="background:${color}; width:24px; height:24px; border-radius:50%; border:3px solid white; box-shadow:0 0 10px rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; color:white; font-size:12px;">👤</div>`;

            return L.divIcon({
                html: iconHtml,
                className: '',
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });
        }

        function updateMap(lat, lng, role) {
            const pos = [lat, lng];
            
            if (!markers[role]) {
                markers[role] = L.marker(pos, { icon: createIcon(role) }).addTo(map);
                if (role === 'user') map.setView(pos, 16);
            } else {
                markers[role].setLatLng(pos);
            }

            if (role === 'user') {
                polyline.addLatLng(pos);
                map.panTo(pos);
            }
            
            document.getElementById('ride-details').innerText = `Last updated: ${new Date().toLocaleTimeString()}`;
        }

        // Subscribe to Realtime Updates via Firebase
        if (rideId) {
            document.getElementById('ride-title').innerText = `Tracking Ride: ${rideId}`;
            
            const rideRef = ref(db, `rides/${rideId}/locations`);
            onValue(rideRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    console.log('New location received:', data);
                    if (data.user) {
                        updateMap(data.user.latitude, data.user.longitude, 'user');
                    }
                    if (data.driver) {
                        updateMap(data.driver.latitude, data.driver.longitude, 'driver');
                    }
                }
            });
        }
    </script>
</body>
</html>
